<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WTFDIPI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #e85d26;
    --bg: #1a1a1e;
    --card: #242429;
    --border: #333339;
    --text: #eee;
    --text2: #9ca3af;
    --green: #6ee7b7;
    --red: #f87171;
    --radius: 10px;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .shell { max-width: 520px; margin: 0 auto; position: relative; }

  /* Toast */
  .toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #fff; padding: 8px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 600; z-index: 999; letter-spacing: 0.3px;
    box-shadow: 0 4px 20px rgba(232,93,38,0.35);
    animation: fadeout 2.2s forwards;
  }
  @keyframes fadeout { 0%,70% { opacity: 1; } 100% { opacity: 0; } }

  /* Header */
  .header { padding: 28px 20px 12px; }
  .logo-row { display: flex; align-items: center; gap: 14px; }
  .logo { font-size: 36px; }
  .title { font-size: 26px; font-weight: 800; letter-spacing: 3px; color: var(--accent); line-height: 1; }
  .subtitle { font-size: 11px; color: var(--text2); letter-spacing: 0.8px; text-transform: uppercase; margin-top: 3px; }
  .stats { margin-top: 12px; font-size: 12px; color: var(--text2); }
  .stats .dot { margin: 0 6px; opacity: 0.4; }

  /* Nav */
  .nav { display: flex; border-bottom: 1px solid var(--border); padding: 0 20px; }
  .nav button {
    flex: 1; background: none; border: none; color: var(--text2); padding: 12px 0;
    font-size: 12px; cursor: pointer; font-family: inherit;
    border-bottom: 2px solid transparent; transition: all .15s; letter-spacing: 0.3px;
  }
  .nav button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
  .nav button:hover { color: var(--text); }

  .body { padding: 20px; }

  /* Form elements */
  input, select {
    width: 100%; padding: 12px 14px; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 13px; font-family: inherit; outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  .search-input { font-size: 15px; padding: 14px 16px; margin-bottom: 16px; }
  select { cursor: pointer; appearance: none; }

  /* Buttons */
  .primary-btn {
    width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: var(--radius);
    color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    margin-top: 16px; letter-spacing: 0.8px; text-transform: uppercase; transition: opacity .15s;
  }
  .primary-btn:disabled { opacity: 0.4; cursor: default; }
  .primary-btn:not(:disabled):hover { opacity: 0.9; }

  .add-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .add-row input { flex: 1; }
  .add-btn {
    width: 44px; background: var(--accent); border: none; border-radius: var(--radius);
    color: #fff; font-size: 20px; font-weight: 700; cursor: pointer; font-family: inherit;
    flex-shrink: 0;
  }
  .add-btn:hover { opacity: 0.9; }

  .sm-btn, .sm-danger {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    width: 28px; height: 28px; cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center; font-family: inherit;
    flex-shrink: 0; transition: border-color .15s;
  }
  .sm-btn { color: var(--text2); }
  .sm-btn:hover { border-color: var(--text2); }
  .sm-danger { color: var(--red); font-size: 12px; }
  .sm-danger:hover { border-color: var(--red); }

  /* Cards & rows */
  .result-card {
    background: var(--card); border-radius: var(--radius); padding: 14px 16px;
    margin-bottom: 8px; border-left: 3px solid var(--accent);
  }
  .result-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .result-loc { font-size: 12px; color: var(--green); display: flex; align-items: center; gap: 5px; }
  .result-time { margin-left: 8px; color: var(--text2); font-size: 11px; }
  .result-none { font-size: 12px; color: var(--text2); font-style: italic; }

  .list-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border-radius: 8px; padding: 12px 14px; margin-bottom: 6px;
  }
  .list-info { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
  .list-name { font-size: 13px; font-weight: 600; word-break: break-word; }
  .list-meta { font-size: 11px; color: var(--green); }
  .list-meta.unassigned { font-style: italic; opacity: 0.5; color: var(--text2); }
  .row-actions { display: flex; gap: 4px; flex-shrink: 0; margin-left: 8px; }

  .edit-row { display: flex; gap: 6px; width: 100%; align-items: center; }
  .edit-row input { flex: 1; padding: 8px 10px; background: var(--bg); border-color: var(--accent); font-size: 13px; }

  .section-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--text2); margin-bottom: 8px;
  }

  .assigned-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border-radius: 8px; padding: 10px 14px; margin-bottom: 6px;
  }
  .assigned-info { display: flex; flex-direction: column; gap: 2px; }
  .assigned-name { font-size: 13px; font-weight: 600; }
  .assigned-loc { font-size: 11px; color: var(--green); }
  .assigned-time { font-size: 10px; color: var(--text2); }

  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 10px; font-size: 11px; color: var(--text2);
  }

  .loc-card { background: var(--card); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; }
  .loc-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .loc-name { font-size: 14px; font-weight: 700; }
  .loc-count { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .loc-items {
    display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .loc-item-chip { background: var(--bg); border-radius: 5px; padding: 4px 9px; font-size: 11px; color: var(--green); font-weight: 500; }

  .empty { text-align: center; color: var(--text2); font-size: 13px; padding: 32px 16px; line-height: 1.6; }

  .hidden { display: none; }

  /* CSV Import */
  .import-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 16px;
    padding: 10px 14px;
    background: var(--card); border: 1px dashed var(--border);
    border-radius: var(--radius); cursor: pointer; transition: border-color .15s;
  }
  .import-row:hover { border-color: var(--accent); }
  .import-label {
    font-size: 12px; color: var(--text2); cursor: pointer;
    display: flex; align-items: center; gap: 8px; width: 100%;
  }
  .import-label .import-icon { font-size: 16px; }
  .import-label .import-text { flex: 1; }
  .import-status {
    font-size: 11px; margin-top: 6px; padding: 0 2px;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .import-status .ok   { color: var(--green); }
  .import-status .skip { color: var(--text2); }
  .import-status .err  { color: var(--red); }
</style>
</head>
<body>
<div class="shell">
  <div id="toast-container"></div>

  <div class="header">
    <div class="logo-row">
      <span class="logo">📦</span>
      <div>
        <h1 class="title">WTFDIPI</h1>
        <p class="subtitle">Where The F*** Did I Put It</p>
      </div>
    </div>
    <div class="stats">
      <span id="stat-items">0 items</span>
      <span class="dot">·</span>
      <span id="stat-locations">0 locations</span>
    </div>
  </div>

  <div class="nav">
    <button class="active" data-view="search">🔍 Find</button>
    <button data-view="assign">📌 Put</button>
    <button data-view="items">🏷 Items</button>
    <button data-view="locations">📍 Locations</button>
  </div>

  <div class="body">
    <!-- SEARCH VIEW -->
    <div id="view-search">
      <input class="search-input" id="search-input" placeholder="What are you looking for?" autofocus>
      <div id="search-results"></div>
      <div class="empty" id="search-hint">Type to search for an item and find where you put it.</div>
    </div>

    <!-- ASSIGN VIEW -->
    <div id="view-assign" class="hidden">
      <div class="section-title">I'm putting...</div>
      <select id="assign-item"><option value="">Select an item</option></select>
      <div class="section-title" style="margin-top:16px">...in this location</div>
      <select id="assign-loc"><option value="">Select a location</option></select>
      <button class="primary-btn" id="assign-btn" disabled>Confirm Placement</button>
      <div id="assigned-list"></div>
      <div id="unassigned-list"></div>
    </div>

    <!-- ITEMS VIEW -->
    <div id="view-items" class="hidden">
      <div class="add-row">
        <input id="new-item" placeholder="New item name...">
        <button class="add-btn" id="add-item-btn">+</button>
      </div>
      <div id="items-list"></div>
    </div>

    <!-- LOCATIONS VIEW -->
    <div id="view-locations" class="hidden">
      <div class="add-row">
        <input id="new-location" placeholder="New location description...">
        <button class="add-btn" id="add-loc-btn">+</button>
      </div>
      <!-- CSV Import -->
      <input type="file" id="csv-file-input" accept=".csv" class="hidden">
      <div class="import-row" id="import-trigger" title="Import locations from a CSV file">
        <label class="import-label" for="csv-file-input">
          <span class="import-icon">📥</span>
          <span class="import-text">Import locations from CSV…</span>
        </label>
      </div>
      <div class="import-status hidden" id="import-status"></div>
      <div id="locations-list"></div>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let items = [];
let locations = [];

// ── API helpers ──────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(`/api${path}`, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (res.status === 204) return null;
  return res.json();
}

// ── Toast ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast-container');
  el.innerHTML = `<div class="toast">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 2300);
}

// ── Time formatting ──────────────────────────────────────────────────────────
function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d ago`;
  return new Date(ts).toLocaleDateString();
}

// ── Data loading ─────────────────────────────────────────────────────────────
async function loadAll() {
  [items, locations] = await Promise.all([api('/items'), api('/locations')]);
  document.getElementById('stat-items').textContent = `${items.length} items`;
  document.getElementById('stat-locations').textContent = `${locations.length} locations`;
}

// ── Navigation ───────────────────────────────────────────────────────────────
document.querySelectorAll('.nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const view = btn.dataset.view;
    ['search', 'assign', 'items', 'locations'].forEach(v => {
      document.getElementById(`view-${v}`).classList.toggle('hidden', v !== view);
    });
    if (view === 'assign') renderAssign();
    if (view === 'items') renderItems();
    if (view === 'locations') renderLocations();
  });
});

// ── SEARCH ───────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', async () => {
  const q = searchInput.value.trim();
  const hint = document.getElementById('search-hint');
  const container = document.getElementById('search-results');
  if (!q) {
    container.innerHTML = '';
    hint.classList.remove('hidden');
    return;
  }
  hint.classList.add('hidden');
  const results = await api(`/search?q=${encodeURIComponent(q)}`);
  if (results.length === 0) {
    container.innerHTML = `<div class="empty">No items matching "${q}"</div>`;
    return;
  }
  container.innerHTML = results.map(r => `
    <div class="result-card">
      <div class="result-name">${esc(r.name)}</div>
      ${r.location_name
        ? `<div class="result-loc"><span>📍</span> ${esc(r.location_name)}<span class="result-time">${timeAgo(r.placed_at)}</span></div>`
        : `<div class="result-none">Not assigned to any location</div>`
      }
    </div>
  `).join('');
});

// ── ASSIGN ───────────────────────────────────────────────────────────────────
function renderAssign() {
  const itemSel = document.getElementById('assign-item');
  const locSel = document.getElementById('assign-loc');
  itemSel.innerHTML = '<option value="">Select an item</option>' +
    items.map(i => `<option value="${i.id}">${esc(i.name)}</option>`).join('');
  locSel.innerHTML = '<option value="">Select a location</option>' +
    locations.map(l => `<option value="${l.id}">${esc(l.name)}</option>`).join('');

  const assigned = items.filter(i => i.location_id);
  const unassigned = items.filter(i => !i.location_id);

  let html = '';
  if (assigned.length) {
    html += `<div class="section-title" style="margin-top:28px">Currently placed</div>`;
    html += assigned.map(i => `
      <div class="assigned-row">
        <div class="assigned-info">
          <span class="assigned-name">${esc(i.name)}</span>
          <span class="assigned-loc">→ ${esc(i.location_name || '?')}</span>
          <span class="assigned-time">${timeAgo(i.placed_at)}</span>
        </div>
        <button class="sm-danger" onclick="unplace(${i.id})">✕</button>
      </div>
    `).join('');
  }
  document.getElementById('assigned-list').innerHTML = html;

  let uhtml = '';
  if (unassigned.length) {
    uhtml += `<div class="section-title" style="margin-top:28px;color:var(--text2)">Unassigned (${unassigned.length})</div>`;
    uhtml += `<div class="chip-row">${unassigned.map(i => `<span class="chip">${esc(i.name)}</span>`).join('')}</div>`;
  }
  document.getElementById('unassigned-list').innerHTML = uhtml;
}

function checkAssignBtn() {
  const btn = document.getElementById('assign-btn');
  btn.disabled = !document.getElementById('assign-item').value || !document.getElementById('assign-loc').value;
}
document.getElementById('assign-item').addEventListener('change', checkAssignBtn);
document.getElementById('assign-loc').addEventListener('change', checkAssignBtn);

document.getElementById('assign-btn').addEventListener('click', async () => {
  const itemId = document.getElementById('assign-item').value;
  const locId = document.getElementById('assign-loc').value;
  if (!itemId || !locId) return;
  await api(`/items/${itemId}/place`, { method: 'POST', body: { location_id: parseInt(locId) } });
  const item = items.find(i => i.id == itemId);
  const loc = locations.find(l => l.id == locId);
  toast(`${item?.name} → ${loc?.name}`);
  await loadAll();
  renderAssign();
  document.getElementById('assign-item').value = '';
  document.getElementById('assign-loc').value = '';
  checkAssignBtn();
});

async function unplace(itemId) {
  await api(`/items/${itemId}/unplace`, { method: 'POST' });
  toast('Item unassigned');
  await loadAll();
  renderAssign();
}

// ── ITEMS ────────────────────────────────────────────────────────────────────
function renderItems() {
  const container = document.getElementById('items-list');
  if (items.length === 0) {
    container.innerHTML = '<div class="empty">No items yet. Add things you want to track above.</div>';
    return;
  }
  container.innerHTML = items.map(i => `
    <div class="list-row" id="item-row-${i.id}">
      <div class="list-info">
        <span class="list-name">${esc(i.name)}</span>
        ${i.location_name
          ? `<span class="list-meta">📍 ${esc(i.location_name)} · ${timeAgo(i.placed_at)}</span>`
          : `<span class="list-meta unassigned">unassigned</span>`
        }
      </div>
      <div class="row-actions">
        <button class="sm-btn" onclick="startEditItem(${i.id}, '${escAttr(i.name)}')">✎</button>
        <button class="sm-danger" onclick="deleteItem(${i.id})">✕</button>
      </div>
    </div>
  `).join('');
}

document.getElementById('add-item-btn').addEventListener('click', addItem);
document.getElementById('new-item').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

async function addItem() {
  const input = document.getElementById('new-item');
  const name = input.value.trim();
  if (!name) return;
  const res = await api('/items', { method: 'POST', body: { name } });
  if (res.error) { toast(res.error); return; }
  toast('Item added');
  input.value = '';
  await loadAll();
  renderItems();
}

async function deleteItem(id) {
  await api(`/items/${id}`, { method: 'DELETE' });
  toast('Item removed');
  await loadAll();
  renderItems();
}

function startEditItem(id, name) {
  const row = document.getElementById(`item-row-${id}`);
  row.innerHTML = `
    <div class="edit-row">
      <input id="edit-input-${id}" value="${escAttr(name)}">
      <button class="sm-btn" onclick="saveEditItem(${id})">✓</button>
      <button class="sm-btn" onclick="renderItems()">✕</button>
    </div>
  `;
  const inp = document.getElementById(`edit-input-${id}`);
  inp.focus();
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveEditItem(id); });
}

async function saveEditItem(id) {
  const name = document.getElementById(`edit-input-${id}`).value.trim();
  if (!name) return;
  await api(`/items/${id}`, { method: 'PUT', body: { name } });
  toast('Updated');
  await loadAll();
  renderItems();
}

// ── CSV IMPORT ───────────────────────────────────────────────────────────────
document.getElementById('csv-file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const statusEl = document.getElementById('import-status');
  const triggerEl = document.getElementById('import-trigger');
  const labelText = triggerEl.querySelector('.import-text');

  labelText.textContent = `Importing ${file.name}…`;
  statusEl.classList.add('hidden');
  statusEl.innerHTML = '';

  const formData = new FormData();
  formData.append('file', file);

  let result;
  try {
    const res = await fetch('/api/locations/import', { method: 'POST', body: formData });
    result = await res.json();
  } catch {
    labelText.textContent = 'Import failed — could not reach server';
    e.target.value = '';
    return;
  }

  // Reset file input so the same file can be re-selected if needed
  e.target.value = '';

  if (result.error) {
    labelText.textContent = 'Import locations from CSV…';
    statusEl.innerHTML = `<span class="err">✕ ${esc(result.error)}</span>`;
    statusEl.classList.remove('hidden');
    return;
  }

  labelText.textContent = 'Import locations from CSV…';

  const parts = [];
  if (result.imported > 0) parts.push(`<span class="ok">✓ ${result.imported} imported</span>`);
  if (result.skipped  > 0) parts.push(`<span class="skip">⊘ ${result.skipped} skipped</span>`);
  if (result.errors && result.errors.some(err => !err.reason.includes('Already exists'))) {
    const realErrors = result.errors.filter(err => !err.reason.includes('Already exists'));
    parts.push(`<span class="err">! ${realErrors.length} error${realErrors.length > 1 ? 's' : ''}</span>`);
  }
  statusEl.innerHTML = parts.join('');
  statusEl.classList.remove('hidden');

  if (result.imported > 0) toast(`Imported ${result.imported} location${result.imported > 1 ? 's' : ''}`);

  await loadAll();
  renderLocations();
});

// ── LOCATIONS ────────────────────────────────────────────────────────────────
function renderLocations() {
  const container = document.getElementById('locations-list');
  if (locations.length === 0) {
    container.innerHTML = '<div class="empty">No locations yet. Describe your storage spots above.</div>';
    return;
  }
  container.innerHTML = locations.map(l => {
    const here = items.filter(i => i.location_id === l.id);
    return `
      <div class="loc-card" id="loc-row-${l.id}">
        <div class="loc-header">
          <div>
            <div class="loc-name">${esc(l.name)}</div>
            <div class="loc-count">${here.length === 0 ? 'empty' : `${here.length} item${here.length > 1 ? 's' : ''}`}</div>
          </div>
          <div class="row-actions">
            <button class="sm-btn" onclick="startEditLoc(${l.id}, '${escAttr(l.name)}')">✎</button>
            <button class="sm-danger" onclick="deleteLoc(${l.id})">✕</button>
          </div>
        </div>
        ${here.length ? `<div class="loc-items">${here.map(i => `<span class="loc-item-chip">${esc(i.name)}</span>`).join('')}</div>` : ''}
      </div>
    `;
  }).join('');
}

document.getElementById('add-loc-btn').addEventListener('click', addLoc);
document.getElementById('new-location').addEventListener('keydown', e => { if (e.key === 'Enter') addLoc(); });

async function addLoc() {
  const input = document.getElementById('new-location');
  const name = input.value.trim();
  if (!name) return;
  const res = await api('/locations', { method: 'POST', body: { name } });
  if (res.error) { toast(res.error); return; }
  toast('Location added');
  input.value = '';
  await loadAll();
  renderLocations();
}

async function deleteLoc(id) {
  await api(`/locations/${id}`, { method: 'DELETE' });
  toast('Location removed');
  await loadAll();
  renderLocations();
}

function startEditLoc(id, name) {
  const row = document.getElementById(`loc-row-${id}`);
  row.innerHTML = `
    <div class="edit-row">
      <input id="edit-input-${id}" value="${escAttr(name)}">
      <button class="sm-btn" onclick="saveEditLoc(${id})">✓</button>
      <button class="sm-btn" onclick="renderLocations()">✕</button>
    </div>
  `;
  const inp = document.getElementById(`edit-input-${id}`);
  inp.focus();
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveEditLoc(id); });
}

async function saveEditLoc(id) {
  const name = document.getElementById(`edit-input-${id}`).value.trim();
  if (!name) return;
  await api(`/locations/${id}`, { method: 'PUT', body: { name } });
  toast('Updated');
  await loadAll();
  renderLocations();
}

// ── Utilities ────────────────────────────────────────────────────────────────
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
function escAttr(s) {
  return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
